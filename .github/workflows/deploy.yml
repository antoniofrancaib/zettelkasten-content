name: Trigger site rebuild

on:
  push:
    branches: [main]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — skipping. Add it in repo Settings → Secrets."
            exit 0
          fi
          curl -sf -X POST "$DEPLOY_HOOK"
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
